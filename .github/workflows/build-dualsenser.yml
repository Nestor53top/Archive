name: Build DualSenseR

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Download DualSenseX release
        shell: pwsh
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri "https://github.com/Paliverse/DualSenseX/releases/download/1.4.9/DualSenseX-Setup.zip" -OutFile "DualSenseX-Setup.zip"
          Expand-Archive -Path "DualSenseX-Setup.zip" -DestinationPath "DualSenseR" -Force

      - name: Verify extraction
        shell: pwsh
        run: |
          Get-ChildItem -Path "DualSenseR" -Recurse | ForEach-Object {
            Write-Host "$($_.FullName) ($($_.Length) bytes)"
          }

      - name: Rename DualSenseX to DualSenseR
        shell: pwsh
        run: |
          Get-ChildItem -Path "DualSenseR" -Recurse -File | ForEach-Object {
            try {
              $bytes = [System.IO.File]::ReadAllBytes($_.FullName)
              $text = [System.Text.Encoding]::UTF8.GetString($bytes)
              if ($text -match 'DualSenseX') {
                $text = $text -replace 'DualSenseX', 'DualSenseR'
                $newBytes = [System.Text.Encoding]::UTF8.GetBytes($text)
                [System.IO.File]::WriteAllBytes($_.FullName, $newBytes)
                Write-Host "Replaced in: $($_.Name)"
              }
            } catch {}
          }

          Get-ChildItem -Path "DualSenseR" -Recurse -File | ForEach-Object {
            $newName = $_.Name -replace 'DualSenseX', 'DualSenseR'
            if ($newName -ne $_.Name) {
              Rename-Item -Path $_.FullName -NewName $newName -Force
              Write-Host "Renamed file: $($_.Name) -> $newName"
            }
          }

          Get-ChildItem -Path "DualSenseR" -Recurse -Directory | Sort-Object { $_.FullName.Length } -Descending | ForEach-Object {
            $newName = $_.Name -replace 'DualSenseX', 'DualSenseR'
            if ($newName -ne $_.Name) {
              Rename-Item -Path $_.FullName -NewName $newName -Force
              Write-Host "Renamed dir: $($_.Name) -> $newName"
            }
          }

      - name: Add renamed resources from repo
        shell: pwsh
        run: |
          if (Test-Path "repo/DualSenseR/Localization") {
            Copy-Item -Path "repo/DualSenseR/Localization/*" -Destination "DualSenseR/Localization/" -Recurse -Force -ErrorAction SilentlyContinue
          }
          if (Test-Path "repo/DualSenseR/Resources") {
            Copy-Item -Path "repo/DualSenseR/Resources/*" -Destination "DualSenseR/Resources/" -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Create zip artifact
        shell: pwsh
        run: |
          Compress-Archive -Path "DualSenseR/*" -DestinationPath "DualSenseR-v1.4.9.zip" -Force
          $zip = Get-Item "DualSenseR-v1.4.9.zip"
          Write-Host "Created: $($zip.Name) ($($zip.Length) bytes)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DualSenseR-v1.4.9
          path: DualSenseR-v1.4.9.zip
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.4.9
          name: DualSenseR v1.4.9
          body: |
            DualSenseR v1.4.9 - Renamed from DualSenseX
            All references changed from DualSenseX to DualSenseR.
          files: DualSenseR-v1.4.9.zip
          make_latest: true
