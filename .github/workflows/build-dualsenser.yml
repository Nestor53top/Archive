name: Build DualSenseR

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Download DualSenseX release
        shell: pwsh
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri "https://github.com/Paliverse/DualSenseX/releases/download/1.4.9/DualSenseX-Setup.zip" -OutFile "DualSenseX-Setup.zip"
          Expand-Archive -Path "DualSenseX-Setup.zip" -DestinationPath "DualSenseR" -Force

      - name: Verify extraction
        shell: pwsh
        run: |
          Write-Host "=== Extracted files ==="
          Get-ChildItem -Path "DualSenseR" -Recurse | ForEach-Object {
            Write-Host " ( bytes)"
          }

      - name: Rename DualSenseX to DualSenseR
        shell: pwsh
        run: |
          # Replace strings inside text-based files
          Get-ChildItem -Path "DualSenseR" -Recurse -File | ForEach-Object {
            try {
               = [System.IO.File]::ReadAllBytes(.FullName)
               = [System.Text.Encoding]::UTF8.GetString()
              if ( -match 'DualSenseX') {
                 =  -replace 'DualSenseX', 'DualSenseR'
                 = [System.Text.Encoding]::UTF8.GetBytes()
                [System.IO.File]::WriteAllBytes(.FullName, )
                Write-Host "Replaced in: "
              }
            } catch {
              # Binary files skip
            }
          }

          # Rename files
          Get-ChildItem -Path "DualSenseR" -Recurse -File | ForEach-Object {
             = .Name -replace 'DualSenseX', 'DualSenseR'
            if ( -ne .Name) {
              Rename-Item -Path .FullName -NewName  -Force
              Write-Host "Renamed file:  -> "
            }
          }

          # Rename directories (bottom-up)
          Get-ChildItem -Path "DualSenseR" -Recurse -Directory | Sort-Object { .FullName.Length } -Descending | ForEach-Object {
             = .Name -replace 'DualSenseX', 'DualSenseR'
            if ( -ne .Name) {
              Rename-Item -Path .FullName -NewName  -Force
              Write-Host "Renamed dir:  -> "
            }
          }

      - name: Add renamed resources from repo
        shell: pwsh
        run: |
          # Copy localization files from repo
          if (Test-Path "repo/DualSenseR/Localization") {
            Copy-Item -Path "repo/DualSenseR/Localization\*" -Destination "DualSenseR\Localization\" -Recurse -Force -ErrorAction SilentlyContinue
          }
          # Copy resources
          if (Test-Path "repo/DualSenseR/Resources") {
            Copy-Item -Path "repo/DualSenseR/Resources\*" -Destination "DualSenseR\Resources\" -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Create zip artifact
        shell: pwsh
        run: |
          Compress-Archive -Path "DualSenseR\*" -DestinationPath "DualSenseR-v1.4.9.zip" -Force
           = Get-Item "DualSenseR-v1.4.9.zip"
          Write-Host "Created:  ( bytes)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DualSenseR-v1.4.9
          path: DualSenseR-v1.4.9.zip
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.4.9
          name: DualSenseR v1.4.9
          body: |
            ## DualSenseR v1.4.9

            Renamed fork of [DualSenseX](https://github.com/Paliverse/DualSenseX) v1.4.9.
            All references changed from DualSenseX to DualSenseR.

            ### Requirements
            - Windows 10/11 (64-bit)
            - [ViGEmBus Driver](https://github.com/ViGEm/ViGEmBus/releases/latest)
            - [HidHide Driver](https://github.com/ViGEm/HidHide/releases/latest)

            ### Credits
            - Original: DualSenseX by Paliverse
          files: DualSenseR-v1.4.9.zip
          make_latest: true
