name: Decompile DualSenseX

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install tools
        run: |
          dotnet tool install --global ilspycmd
          sudo apt-get update && sudo apt-get install -y p7zip-full binwalk

      - name: Extract nupkg
        run: |
          mkdir -p DualSenseX_Reverse/Extracted
          mkdir -p DualSenseX_Reverse/Source
          
          # Use binwalk to extract embedded ZIP
          binwalk -e -C DualSenseX_Reverse/Extracted DualSenseX_Reverse/DualSenseX-Setup.exe
          
          echo "=== Extracted files ==="
          find DualSenseX_Reverse/Extracted -type f | sort
          
          # Find the nupkg
          find DualSenseX_Reverse/Extracted -name "*nupkg*" -o -name "*.zip" | while read f; do
            echo "=== Found archive: $f ==="
            mkdir -p DualSenseX_Reverse/Extracted/nupkg
            7z x "$f" -oDualSenseX_Reverse/Extracted/nupkg -y 2>&1 || echo "Failed to extract: $f"
          done
          
          echo "=== All .exe and .dll ==="
          find DualSenseX_Reverse/Extracted \( -name "*.exe" -o -name "*.dll" \) | sort

      - name: Decompile all .NET assemblies
        run: |
          for f in $(find DualSenseX_Reverse/Extracted \( -name "*.exe" -o -name "*.dll" \) | sort); do
            bn=$(basename "$f")
            name="${bn%.*}"
            dir="DualSenseX_Reverse/Source/${name}"
            mkdir -p "$dir"
            echo "=== Decompiling: $f ==="
            ilspycmd -p -o "$dir" "$f" 2>&1 && echo "OK: $bn" || echo "FAILED: $bn"
          done

      - name: Clean
        run: |
          find DualSenseX_Reverse/Source -type d -empty -delete 2>/dev/null || true
          echo "=== Final Source ==="
          ls -la DualSenseX_Reverse/Source/

      - name: Commit
        run: |
          git config user.name "Nestor53top"
          git config user.email "varlamovnestor90@gmail.com"
          git add DualSenseX_Reverse/Source/
          git diff --cached --quiet || git commit -m "Decompiled source from DualSenseX-Setup.exe"
          git push
