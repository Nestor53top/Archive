name: Decompile DualSenseX

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install tools
        run: |
          dotnet tool install --global ilspycmd
          sudo apt-get update && sudo apt-get install -y p7zip-full binwalk file

      - name: Analyze installer
        run: |
          echo "=== File type ==="
          file DualSenseX_Reverse/DualSenseX-Setup.exe
          
          echo "=== Strings looking for .NET ==="
          strings DualSenseX_Reverse/DualSenseX-Setup.exe | grep -i "\.dll\|\.exe\|mscorlib\|System\.\|DualSense" | head -30
          
          echo "=== 7z detailed list ==="
          7z l DualSenseX_Reverse/DualSenseX-Setup.exe 2>/dev/null | head -30

      - name: Extract with different methods
        run: |
          mkdir -p DualSenseX_Reverse/Extracted
          
          # Try Squirrel extraction (the installer might be Squirrel-based)
          7z x DualSenseX_Reverse/DualSenseX-Setup.exe -oDualSenseX_Reverse/Extracted -y
          
          echo "=== Extracted files ==="
          find DualSenseX_Reverse/Extracted -type f -exec ls -lh {} \;
          
          # Check if any of the extracted files are actually nested archives
          find DualSenseX_Reverse/Extracted -type f | while read f; do
            echo "--- $f ---"
            file "$f"
          done

      - name: Try binwalk extraction
        run: |
          mkdir -p DualSenseX_Reverse/BinwalkExtracted
          binwalk -e -d 3 -C DualSenseX_Reverse/BinwalkExtracted DualSenseX_Reverse/DualSenseX-Setup.exe 2>&1 || echo "binwalk failed"
          
          echo "=== Binwalk results ==="
          find DualSenseX_Reverse/BinwalkExtracted -type f -name "*.exe" -o -name "*.dll" -o -name "*.cs" | head -30

      - name: Decompile all found .NET assemblies
        run: |
          mkdir -p DualSenseX_Reverse/Source
          for f in $(find DualSenseX_Reverse/Extracted DualSenseX_Reverse/BinwalkExtracted \( -name "*.exe" -o -name "*.dll" \) 2>/dev/null); do
            bn=$(basename "$f")
            name="${bn%.*}"
            dir="DualSenseX_Reverse/Source/${name}"
            mkdir -p "$dir"
            echo "=== Decompiling: $f ==="
            ilspycmd -p -o "$dir" "$f" 2>&1 && echo "OK: $bn" || echo "FAILED: $bn"
          done

      - name: Clean
        run: |
          find DualSenseX_Reverse/Source -type d -empty -delete 2>/dev/null || true
          echo "=== Final Source ==="
          ls -la DualSenseX_Reverse/Source/

      - name: Commit
        run: |
          git config user.name "Nestor53top"
          git config user.email "varlamovnestor90@gmail.com"
          git add DualSenseX_Reverse/Source/
          git diff --cached --quiet || git commit -m "Decompiled source from DualSenseX-Setup.exe"
          git push
