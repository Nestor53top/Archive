name: Decompile DualSenseX

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install tools
        run: |
          sudo apt-get update && sudo apt-get install -y p7zip-full innoextract
          dotnet tool install --global ilspycmd

      - name: Extract installer
        run: |
          mkdir -p DualSenseX_Reverse/Extracted
          innoextract -d DualSenseX_Reverse/Extracted DualSenseX_Reverse/DualSenseX-Setup.exe

      - name: List extracted files
        run: |
          echo "=== Top level ==="
          ls -la DualSenseX_Reverse/Extracted/
          echo ""
          echo "=== All .exe and .dll ==="
          find DualSenseX_Reverse/Extracted -name "*.exe" -o -name "*.dll" | head -30

      - name: Decompile app binaries only
        run: |
          mkdir -p DualSenseX_Reverse/Source
          find DualSenseX_Reverse/Extracted -name "*.exe" -o -name "*.dll" | while read f; do
            bn=$(basename "$f" .exe)
            bn=$(basename "$bn" .dll)
            dir="DualSenseX_Reverse/Source/${bn}_src"
            mkdir -p "$dir"
            echo "=== Decompiling: $f ==="
            ilspycmd -p -o "$dir" "$f" 2>&1 && echo "OK: $f" || echo "FAILED: $f"
          done

      - name: Remove empty dirs
        run: |
          find DualSenseX_Reverse/Source -type d -empty -delete 2>/dev/null || true
          echo "=== Source structure ==="
          ls DualSenseX_Reverse/Source/ | head -30
          echo "..."
          echo "Total items: $(ls DualSenseX_Reverse/Source/ | wc -l)"

      - name: Commit and push
        run: |
          git config user.name "Nestor53top"
          git config user.email "varlamovnestor90@gmail.com"
          git add DualSenseX_Reverse/Source/
          git diff --cached --quiet || git commit -m "Add decompiled source from DualSenseX-Setup.exe"
          git push
