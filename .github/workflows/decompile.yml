name: Decompile DualSenseX

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install tools
        run: |
          dotnet tool install --global ilspycmd
          sudo apt-get update && sudo apt-get install -y p7zip-full python3

      - name: Extract nupkg with Python zipfile
        run: |
          mkdir -p DualSenseX_Reverse/Extracted/nupkg
          mkdir -p DualSenseX_Reverse/Source
          
          python3 << 'PYEOF'
          import zipfile, struct, io, os
          
          with open("DualSenseX_Reverse/DualSenseX-Setup.exe", "rb") as f:
              data = f.read()
          
          # Find the nupkg by searching for its name in the file
          nupkg_name = b"DualSenseX-1.4.9-full.nupkg"
          name_pos = data.find(nupkg_name)
          print(f"nupkg name found at: {name_pos} (0x{name_pos:X})")
          
          # Find all PK local file headers and try each one
          pk_sig = b'PK\x03\x04'
          offsets = []
          i = 0
          while True:
              idx = data.find(pk_sig, i)
              if idx == -1:
                  break
              offsets.append(idx)
              i = idx + 1
          
          print(f"Found {len(offsets)} PK local file headers")
          
          # Try each offset to see if it's a valid nupkg
          for off in offsets:
              try:
                  nupkg_data = data[off:]
                  zf = zipfile.ZipFile(io.BytesIO(nupkg_data))
                  names = zf.namelist()
                  # Check if this looks like the nupkg (has lib/net45/DualSenseX.exe)
                  if any('DualSenseX.exe' in n and 'net45' in n for n in names):
                      print(f"Found nupkg at offset 0x{off:X} with {len(names)} files")
                      for name in sorted(names):
                          print(f"  {name}")
                      # Extract it
                      zf.extractall("DualSenseX_Reverse/Extracted/nupkg")
                      print(f"Extracted to DualSenseX_Reverse/Extracted/nupkg")
                      break
                  zf.close()
              except Exception as e:
                  continue
          else:
              print("Could not find valid nupkg")
          
          PYEOF

      - name: Decompile all .NET assemblies
        run: |
          for f in $(find DualSenseX_Reverse/Extracted \( -name "*.exe" -o -name "*.dll" \) | sort); do
            bn=$(basename "$f")
            name="${bn%.*}"
            dir="DualSenseX_Reverse/Source/${name}"
            mkdir -p "$dir"
            echo "=== Decompiling: $f ==="
            ilspycmd -p -o "$dir" "$f" 2>&1 && echo "OK: $bn" || echo "FAILED: $bn"
          done

      - name: Clean
        run: |
          find DualSenseX_Reverse/Source -type d -empty -delete 2>/dev/null || true
          echo "=== Final Source ==="
          ls -la DualSenseX_Reverse/Source/

      - name: Commit
        run: |
          git config user.name "Nestor53top"
          git config user.email "varlamovnestor90@gmail.com"
          git add DualSenseX_Reverse/Source/
          git diff --cached --quiet || git commit -m "Decompiled source from DualSenseX-Setup.exe"
          git push
