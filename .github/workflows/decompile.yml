name: Decompile DualSenseX

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone DualSenseX source
        run: |
          git clone https://github.com/Paliverse/DualSenseX.git DualSenseX_Reverse/Source_repo

      - name: Find C# source files
        run: |
          mkdir -p DualSenseX_Reverse/Source
          find DualSenseX_Reverse/Source_repo -name "*.cs" | head -5
          echo "---"
          ls DualSenseX_Reverse/Source_repo/
          
          # Copy the source into Source folder
          cp -r DualSenseX_Reverse/Source_repo/* DualSenseX_Reverse/Source/ 2>/dev/null || true
          
          # Remove .git and other non-source files
          rm -rf DualSenseX_Reverse/Source/.git 2>/dev/null || true
          
          echo "=== Source structure ==="
          find DualSenseX_Reverse/Source -name "*.cs" | wc -l
          echo "C# files found"
          ls DualSenseX_Reverse/Source/

      - name: Commit
        run: |
          git config user.name "Nestor53top"
          git config user.email "varlamovnestor90@gmail.com"
          git add DualSenseX_Reverse/Source/
          git diff --cached --quiet || git commit -m "Add DualSenseX source code (from GitHub repo)"
          git push
