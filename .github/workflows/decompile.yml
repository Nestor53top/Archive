name: Decompile DualSenseX

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install tools
        run: |
          dotnet tool install --global ilspycmd
          sudo apt-get update && sudo apt-get install -y p7zip-full binutils

      - name: Extract Squirrel installer
        run: |
          mkdir -p DualSenseX_Reverse/Extracted
          
          # Extract the setup exe (Squirrel wraps the app)
          7z x DualSenseX_Reverse/DualSenseX-Setup.exe -oDualSenseX_Reverse/Extracted -y
          
          # Also try extracting embedded resources with objdump
          echo "=== PE sections of DualSenseX-Setup.exe ==="
          objdump -h DualSenseX_Reverse/DualSenseX-Setup.exe 2>/dev/null || true
          
          # List all files
          echo "=== All extracted files ==="
          find DualSenseX_Reverse/Extracted -type f -exec ls -lh {} \;

      - name: Decompile Update.exe
        run: |
          mkdir -p DualSenseX_Reverse/Source
          echo "=== Decompiling Update.exe ==="
          ilspycmd -p -o DualSenseX_Reverse/Source/Update DualSenseX_Reverse/Extracted/Update.exe 2>&1 || echo "FAILED"
          
          # Also decompile setup.exe itself
          echo "=== Decompiling Setup.exe ==="
          ilspycmd -p -o DualSenseX_Reverse/Source/Setup DualSenseX_Reverse/DualSenseX-Setup.exe 2>&1 || echo "FAILED: Setup.exe is not .NET"

      - name: Find any other .NET assemblies
        run: |
          # Search for any .dll files that might have been missed
          find DualSenseX_Reverse -name "*.dll" -o -name "*.exe" | while read f; do
            echo "=== Checking: $f ==="
            ilspycmd --list "$f" 2>/dev/null && echo "  -> .NET assembly" || echo "  -> Not .NET"
          done

      - name: Clean
        run: |
          find DualSenseX_Reverse/Source -type d -empty -delete 2>/dev/null || true
          echo "=== Final Source structure ==="
          ls -la DualSenseX_Reverse/Source/

      - name: Commit
        run: |
          git config user.name "Nestor53top"
          git config user.email "varlamovnestor90@gmail.com"
          git add DualSenseX_Reverse/Source/
          git diff --cached --quiet || git commit -m "Decompiled source from DualSenseX-Setup.exe"
          git push
