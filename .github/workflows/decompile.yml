name: Decompile DualSenseX

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install tools
        run: |
          sudo apt-get update && sudo apt-get install -y p7zip-full
          dotnet tool install --global ilspycmd
          dotnet tool install --global ICSharpCode.Decompiler.Console

      - name: Extract installer
        run: |
          mkdir -p DualSenseX_Reverse/Extracted
          cd DualSenseX_Reverse
          7z x DualSenseX-Setup.exe -oExtracted -y

      - name: Find and list .NET assemblies
        run: |
          echo "=== All .exe files ==="
          find DualSenseX_Reverse/Extracted -name "*.exe" -exec ls -lh {} \;
          echo ""
          echo "=== All .dll files ==="
          find DualSenseX_Reverse/Extracted -name "*.dll" -exec ls -lh {} \;
          
      - name: Decompile all
        run: |
          mkdir -p DualSenseX_Reverse/Source
          find DualSenseX_Reverse/Extracted \( -name "*.exe" -o -name "*.dll" \) -exec sh -c '
            for f; do
              bn=$(basename "$f")
              name="${bn%.*}"
              dir="DualSenseX_Reverse/Source/${name}"
              mkdir -p "$dir"
              echo "=== Decompiling: $f ==="
              ilspycmd -p -o "$dir" "$f" 2>&1 && echo "OK: $bn" || echo "FAILED: $bn"
            done
          ' _ {} +

      - name: Remove empty dirs
        run: |
          find DualSenseX_Reverse/Source -type d -empty -delete 2>/dev/null || true
          echo "=== Source structure ==="
          ls DualSenseX_Reverse/Source/

      - name: Commit and push
        run: |
          git config user.name "Nestor53top"
          git config user.email "varlamovnestor90@gmail.com"
          git add DualSenseX_Reverse/Source/
          git diff --cached --quiet || git commit -m "Add decompiled source from DualSenseX-Setup.exe"
          git push
