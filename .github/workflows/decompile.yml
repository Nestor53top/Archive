name: Decompile DualSenseX

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install ilspycmd
        run: dotnet tool install --global ilspycmd

      - name: Install 7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Extract installer
        run: |
          mkdir -p DualSenseX_Reverse/Extracted
          7z x DualSenseX_Reverse/DualSenseX-Setup.exe -oDualSenseX_Reverse/Extracted -y

      - name: List extracted
        run: |
          find DualSenseX_Reverse/Extracted -name "*.exe" -o -name "*.dll" | sort

      - name: Decompile all
        run: |
          mkdir -p DualSenseX_Reverse/Source
          for f in $(find DualSenseX_Reverse/Extracted \( -name "*.exe" -o -name "*.dll" \) | sort); do
            bn=$(basename "$f")
            name="${bn%.*}"
            dir="DualSenseX_Reverse/Source/${name}"
            mkdir -p "$dir"
            echo "=== Decompiling: $f ==="
            ilspycmd -p -o "$dir" "$f" 2>&1 && echo "OK" || echo "FAILED"
          done

      - name: Clean
        run: find DualSenseX_Reverse/Source -type d -empty -delete 2>/dev/null; ls DualSenseX_Reverse/Source/

      - name: Commit
        run: |
          git config user.name "Nestor53top"
          git config user.email "varlamovnestor90@gmail.com"
          git add DualSenseX_Reverse/Source/
          git diff --cached --quiet || git commit -m "Decompiled source from DualSenseX-Setup.exe"
          git push
