name: Decompile DualSenseX

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install tools
        run: |
          dotnet tool install --global ilspycmd
          sudo apt-get update && sudo apt-get install -y p7zip-full binwalk

      - name: Extract nupkg from installer
        run: |
          mkdir -p DualSenseX_Reverse/Extracted
          mkdir -p DualSenseX_Reverse/Source
          
          # binwalk found a ZIP at offset 0xE3B707 (14923527)
          echo "=== Extracting nupkg from setup.exe ==="
          dd if=DualSenseX_Reverse/DualSenseX-Setup.exe bs=1 skip=14923527 of=DualSenseX_Reverse/Extracted/DualSenseX.nupkg
          
          echo "=== Extracting nupkg ==="
          7z x DualSenseX_Reverse/Extracted/DualSenseX.nupkg -oDualSenseX_Reverse/Extracted/nupkg -y
          
          echo "=== Contents of nupkg ==="
          find DualSenseX_Reverse/Extracted/nupkg -type f -name "*.exe" -o -name "*.dll" | sort

      - name: Decompile all .NET assemblies
        run: |
          for f in $(find DualSenseX_Reverse/Extracted/nupkg \( -name "*.exe" -o -name "*.dll" \) | sort); do
            bn=$(basename "$f")
            name="${bn%.*}"
            dir="DualSenseX_Reverse/Source/${name}"
            mkdir -p "$dir"
            echo "=== Decompiling: $f ==="
            ilspycmd -p -o "$dir" "$f" 2>&1 && echo "OK: $bn" || echo "FAILED: $bn"
          done

      - name: Clean
        run: |
          find DualSenseX_Reverse/Source -type d -empty -delete 2>/dev/null || true
          echo "=== Final Source ==="
          ls -la DualSenseX_Reverse/Source/

      - name: Commit
        run: |
          git config user.name "Nestor53top"
          git config user.email "varlamovnestor90@gmail.com"
          git add DualSenseX_Reverse/Source/
          git diff --cached --quiet || git commit -m "Decompiled source from DualSenseX-Setup.exe"
          git push
